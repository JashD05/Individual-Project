kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: chaos-sec
networking:
  # Disable the default kindnet CNI so Calico can be installed.
  # Calico is required to enforce NetworkPolicies (kindnet does NOT enforce them).
  disableDefaultCNI: true
  podSubnet: "192.168.0.0/16"
nodes:
  - role: control-plane
    image: kindest/node:v1.31.0
