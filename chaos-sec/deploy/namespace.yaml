apiVersion: v1
kind: Namespace
metadata:
  name: chaos-sec-experiments
  labels:
    # Enforce the "restricted" Pod Security Standard.
    # This blocks pods that request hostPath volumes, host networking,
    # run as root, etc. — exactly what the host-path-access experiment tests.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
